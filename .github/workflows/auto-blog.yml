name: Publication automatique d'un article de blog

on:
  schedule:
    - cron: "0 8 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Publier le prochain article
        run: python automation/publish_article.py
      - name: Committer et pousser si nouvel article
        run: |
          git config user.name "PNBS Auto-Blog"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Article de blog automatique ($(date +%d/%m/%Y))"
            git push
            echo "Nouvel article publie et pousse."
          else
            echo "Aucun nouvel article a publier (file vide)."
          fi
